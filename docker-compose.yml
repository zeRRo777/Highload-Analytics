networks:
    my_network:
        driver: bridge

services:
    web:
        image: nginx:alpine
        container_name: app_nginx
        ports:
            - 127.0.0.1:8080:80
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            php:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
        networks:
            - my_network

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            target: development
        container_name: app_php
        volumes:
            - ./:/var/www/html
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9000' || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
        networks:
            - my_network

    db:
        image: postgres:18-alpine
        container_name: app_db
        restart: unless-stopped
        ports:
            - 127.0.0.1:${DB_PORT:-5432}:5432
        volumes:
            - db_data_highload_analytics:/var/lib/postgresql
            - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
        environment:
            POSTGRES_DB: ${DB_DATABASE:-laravel}
            POSTGRES_USER: ${DB_USERNAME:-laravel}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-laravel}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - my_network

    redis:
        image: redis:alpine
        container_name: app_redis
        restart: unless-stopped
        command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
        ports:
            - "${REDIS_PORT:-6379}:6379"
        volumes:
            - redis_data_highload_analytics:/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'redis-cli --no-auth-warning -a "${REDIS_PASSWORD:-secret}" ping | grep PONG || exit 1',
                ]
            interval: 10s
            timeout: 5s
            retries: 3
        networks:
            - my_network

    redisinsight:
        image: redis/redisinsight:latest
        container_name: app_redisinsight
        restart: unless-stopped
        ports:
            - "127.0.0.1:5540:5540"
        depends_on:
            redis:
                condition: service_healthy
        networks:
            - my_network
volumes:
    db_data_highload_analytics:
    redis_data_highload_analytics:
